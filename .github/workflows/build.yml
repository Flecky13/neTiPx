name: Cross-Platform Build

on:
  push:
    branches: [ main, rewrite, develop ]
  pull_request:
    branches: [ main, rewrite ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'neTiPx-CrossPlatform.sln'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install NSIS
      run: |
        choco install nsis -y
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Write-Host "NSIS installed. Path updated."

    - name: Verify NSIS Installation
      run: |
        $makensis = Get-Command makensis -ErrorAction SilentlyContinue
        if ($makensis) {
          Write-Host "✅ NSIS found at: $($makensis.Source)"
        } else {
          Write-Host "❌ NSIS not found in PATH"
          exit 1
        }

    - name: Build Windows Installer
      run: .\.github\scripts\build-windows-release.ps1
      shell: pwsh

    - name: Upload Windows x64 Installer
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-Windows-x64-Installer
        path: release-assets/*.exe

    - name: Upload Windows x64 Portable
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-Windows-x64-Portable
        path: publish/windows-x64/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libice-dev libsm-dev libfontconfig1-dev

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Publish Linux x64
      run: dotnet publish src/neTiPx.UI.Avalonia/neTiPx.UI.Avalonia.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64

    - name: Publish Linux ARM64
      run: dotnet publish src/neTiPx.UI.Avalonia/neTiPx.UI.Avalonia.csproj -c Release -r linux-arm64 --self-contained -o publish/linux-arm64

    - name: Upload Linux x64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-Linux-x64
        path: publish/linux-x64/

    - name: Upload Linux ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-Linux-ARM64
        path: publish/linux-arm64/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Publish macOS x64
      run: dotnet publish src/neTiPx.UI.Avalonia/neTiPx.UI.Avalonia.csproj -c Release -r osx-x64 --self-contained -o publish/osx-x64

    - name: Publish macOS ARM64
      run: dotnet publish src/neTiPx.UI.Avalonia/neTiPx.UI.Avalonia.csproj -c Release -r osx-arm64 --self-contained -o publish/osx-arm64

    - name: Upload macOS x64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-macOS-x64
        path: publish/osx-x64/

    - name: Upload macOS ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-macOS-ARM64
        path: publish/osx-arm64/

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          neTiPx-Windows-x64/**
          neTiPx-Windows-ARM64/**
          neTiPx-Linux-x64/**
          neTiPx-Linux-ARM64/**
          neTiPx-macOS-x64/**
          neTiPx-macOS-ARM64/**
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
