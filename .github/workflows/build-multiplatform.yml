name: Build Multi-Platform

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/neTiPx.UI.Avalonia/neTiPx.UI.Avalonia.csproj'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-x86, win-arm64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
    
    - name: Build
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          -c Release `
          -r ${{ matrix.rid }} `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -o ./publish/${{ matrix.rid }}
    
    - name: Create ZIP Archive
      run: |
        Compress-Archive -Path ./publish/${{ matrix.rid }}/* `
          -DestinationPath ./neTiPx-${{ matrix.rid }}.zip
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-${{ matrix.rid }}
        path: neTiPx-${{ matrix.rid }}.zip
        retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxcursor-dev libxi-dev
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
    
    - name: Build
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r ${{ matrix.rid }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishTrimmed=false \
          -o ./publish/${{ matrix.rid }}
        
        chmod +x ./publish/${{ matrix.rid }}/neTiPx.UI.Avalonia
    
    - name: Create tar.gz Archive
      run: |
        tar -czf neTiPx-${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} .
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-${{ matrix.rid }}
        path: neTiPx-${{ matrix.rid }}.tar.gz
        retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        rid: [osx-x64, osx-arm64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
    
    - name: Build
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r ${{ matrix.rid }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishTrimmed=false \
          -o ./publish/${{ matrix.rid }}
        
        chmod +x ./publish/${{ matrix.rid }}/neTiPx.UI.Avalonia
    
    - name: Create App Bundle
      run: |
        APP_NAME="neTiPx"
        APP_BUNDLE="./neTiPx.app"
        
        mkdir -p "${APP_BUNDLE}/Contents/MacOS"
        mkdir -p "${APP_BUNDLE}/Contents/Resources"
        
        cp "./publish/${{ matrix.rid }}/neTiPx.UI.Avalonia" "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
        chmod +x "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
        
        cat > "${APP_BUNDLE}/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.netipx.app</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.7.2</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
    
    - name: Create ZIP
      run: |
        zip -r neTiPx-${{ matrix.rid }}.zip neTiPx.app
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neTiPx-${{ matrix.rid }}
        path: neTiPx-${{ matrix.rid }}.zip
        retention-days: 7

